<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Trade | Global Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .active-tab { border-bottom: 3px solid #22c55e; color: #22c55e; }
        .tab-content { display: none; }
        .show { display: block; }
        iframe { border-radius: 8px; background: #161b22; }
    </style>
</head>
<body class="p-2 md:p-6">

    <header class="flex justify-between items-center mb-8 bg-[#161b22] p-4 rounded-xl shadow-lg border border-[#30363d]">
        <div class="flex items-center gap-2">
            <span class="text-2xl">📈</span>
            <h1 class="text-xl font-bold text-green-500 tracking-tight">GROWTH TRADE</h1>
        </div>
        <div class="text-xs text-gray-400">Live Global Market</div>
    </header>

    <nav class="flex space-x-6 border-b border-[#30363d] mb-6 overflow-x-auto">
        <button onclick="openTab(event, 'crypto')" class="tab-links active-tab pb-2 font-semibold">CRYPTO</button>
        <button onclick="openTab(event, 'indian')" class="tab-links pb-2 font-semibold text-gray-400">INDIAN STOCKS</button>
        <button onclick="openTab(event, 'us-stocks')" class="tab-links pb-2 font-semibold text-gray-400">US STOCKS</button>
    </nav>

    <div id="crypto" class="tab-content show animate-fadeIn">
        <h2 class="text-lg mb-4 text-gray-300 font-medium">Crypto Market Heatmap</h2>
        <div style="height: 600px; width: 100%;">
            <iframe src="https://www.tradingview.com/embed-widget/crypto-coins-heatmap/?locale=en#%7B%22symbol%22%3A%22BTCUSDT%22%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Afalse%2C%22displayMode%22%3A%22adaptive%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%7D" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <div id="indian" class="tab-content animate-fadeIn">
        <h2 class="text-lg mb-4 text-gray-300 font-medium">NSE/BSE Market Heatmap</h2>
        <div style="height: 600px; width: 100%;">
            <iframe src="https://www.tradingview.com/embed-widget/stock-heatmap/?locale=en#%7B%22exchanges%22%3A%5B%22NSE%22%5D%2C%22dataSource%22%3A%22SENSEX%22%2C%22grouping%22%3A%22sector%22%2C%22index%22%3A%22%22%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Afalse%2C%22displayMode%22%3A%22adaptive%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%7D" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <div id="us-stocks" class="tab-content animate-fadeIn">
        <h2 class="text-lg mb-4 text-gray-300 font-medium">S&P 500 Heatmap</h2>
        <div style="height: 600px; width: 100%;">
            <iframe src="https://www.tradingview.com/embed-widget/stock-heatmap/?locale=en#%7B%22exchanges%22%3A%5B%5D%2C%22dataSource%22%3A%22SPX500%22%2C%22grouping%22%3A%22sector%22%2C%22index%22%3A%22%22%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Afalse%2C%22displayMode%22%3A%22adaptive%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%7D" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <footer class="mt-10 text-center text-gray-500 text-xs border-t border-[#30363d] pt-6 pb-10">
        &copy; 2026 Growth Trade Masterguide. All rights reserved.
    </footer>

    <script>
        function openTab(evt, tabName) {
            var i, tabContent, tabLinks;
            tabContent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabContent.length; i++) {
                tabContent[i].style.display = "none";
            }
            tabLinks = document.getElementsByClassName("tab-links");
            for (i = 0; i < tabLinks.length; i++) {
                tabLinks[i].className = tabLinks[i].className.replace(" active-tab", "");
                tabLinks[i].classList.add("text-gray-400");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active-tab";
            evt.currentTarget.classList.remove("text-gray-400");
        }
    </script>
</body>
</html>

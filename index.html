<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Growth Trade community v4</title>
<style>
  :root { --neon: #00ff88; --nav-h: 70px; --bg: #000; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    height: 100%; width: 100%; 
    background: var(--bg); color: white; 
    overflow: hidden; font-family: sans-serif; 
  }
  
  .app-shell { display: flex; flex-direction: column; height: 100dvh; width: 100%; }
  
  header { 
    height: 50px; flex-shrink: 0; 
    display: flex; align-items: center; justify-content: center; 
    border-bottom: 2px solid var(--neon); background: #000; z-index: 100; 
  }
  header h1 { font-size: 18px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

  main { flex: 1; position: relative; background: #000; overflow: hidden; }
  
  /* Navigation Fix */
  nav { 
    height: var(--nav-h); flex-shrink: 0; background: #000; 
    display: flex; border-top: 1px solid #333; 
    padding-bottom: env(safe-area-inset-bottom, 15px); z-index: 1000;
  }
  nav button { 
    flex: 1; background: none; border: none; 
    color: #555; font-size: 10px; font-weight: bold; 
    text-transform: uppercase; display: flex; 
    align-items: center; justify-content: center; cursor: pointer;
  }
  nav button.active { 
    color: var(--neon); border-top: 3px solid var(--neon); 
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent); 
  }

  /* Heatmap Category Switcher */
  .map-tabs {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; background: rgba(0,0,0,0.8);
    padding: 6px; border-radius: 30px; border: 1px solid #444; z-index: 10;
  }
  .map-tabs button {
    background: #222; border: none; color: #aaa; padding: 6px 15px;
    border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold;
  }
  .map-tabs button.active-sub { background: var(--neon); color: #000; }
</style>
</head>
<body>

<div class="app-shell">
  <header><h1>📈 GROWTH TRADE</h1></header>
  
  <main id="view-port">
    <div id="content-area" style="width:100%; height:100%;"></div>
  </main>

  <nav id="bottom-nav">
    <button class="active" onclick="loadWidget('crypto', this)">Crypto</button>
    <button onclick="loadWidget('stocks', this)">Stocks</button>
    <button onclick="loadWidget('charts', this)">Charts</button>
    <button onclick="loadWidget('events', this)">Events</button>
    <button onclick="loadWidget('heatmap', this)">Heatmap</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const container = document.getElementById('content-area');

function loadWidget(type, btn) {
  document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  container.innerHTML = ""; // Clean logic

  if (type === 'crypto') {
    injectScript("https://s3.tradingview.com/external-embedding/embed-widget-screener.js", {
      "width": "100%", "height": "100%", "screener_type": "crypto_mkt", "colorTheme": "dark", "locale": "en"
    });
  } 
  else if (type === 'stocks') {
    injectScript("https://s3.tradingview.com/external-embedding/embed-widget-screener.js", {
      "width": "100%", "height": "100%", "screener_type": "stock", "market": "india", "colorTheme": "dark", "locale": "en"
    });
  }
  else if (type === 'charts') {
    const div = document.createElement('div');
    div.id = "tv_chart";
    div.style.height = "100%";
    container.appendChild(div);
    new TradingView.widget({
      "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15",
      "theme": "dark", "container_id": "tv_chart", "allow_symbol_change": true
    });
  }
  else if (type === 'events') {
    injectScript("https://s3.tradingview.com/external-embedding/embed-widget-events.js", {
      "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en"
    });
  }
  else if (type === 'heatmap') {
    // Sub-navigation for Heatmap
    const navDiv = document.createElement('div');
    navDiv.className = "map-tabs";
    navDiv.innerHTML = `
      <button id="m1" class="active-sub" onclick="runHeatmap('crypto', 'm1')">Crypto</button>
      <button id="m2" onclick="runHeatmap('india', 'm2')">India</button>
      <button id="m3" onclick="runHeatmap('us', 'm3')">US</button>
    `;
    container.appendChild(navDiv);

    const mapDisplay = document.createElement('div');
    mapDisplay.id = "map-render";
    mapDisplay.style.height = "100%";
    container.appendChild(mapDisplay);

    runHeatmap('crypto', 'm1'); // Initial load
  }
}

function runHeatmap(market, btnId) {
  const display = document.getElementById('map-render');
  display.innerHTML = ""; // Clear old map
  document.querySelectorAll('.map-tabs button').forEach(b => b.classList.remove('active-sub'));
  document.getElementById(btnId).classList.add('active-sub');

  let scriptUrl = "https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js";
  let config = { "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" };

  if (market === 'crypto') {
    scriptUrl = "https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js";
  } else if (market === 'india') {
    config.exchange = "NSE";
  } else {
    config.dataSource = "SPX500";
  }

  const script = document.createElement('script');
  script.src = scriptUrl;
  script.async = true;
  script.innerHTML = JSON.stringify(config);
  display.appendChild(script);
}

function injectScript(src, config) {
  const script = document.createElement('script');
  script.src = src;
  script.async = true;
  script.innerHTML = JSON.stringify(config);
  container.appendChild(script);
}

window.onload = () => loadWidget('crypto', document.querySelector('#bottom-nav button'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Trade Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
  :root {
    --bg: #05070a;
    --card: #0d1117;
    --neon: #00ff88;
    --purple: #8a2be2;
    --text: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, html {
    height: 100%;
    background: radial-gradient(circle at top, #1a1a2e 0%, #05070a 100%);
    font-family: 'Segoe UI', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  .main-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* 1. BESTEST HEADER */
  header {
    height: 55px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.6);
    border-bottom: 2px solid var(--neon);
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    z-index: 10;
  }

  header h1 {
    font-size: 20px;
    color: var(--neon);
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--neon);
  }

  /* 2. PRICE TICKER (FIXED FOR NIFTY) */
  .ticker-section {
    height: 65px;
    background: rgba(13, 17, 23, 0.8);
    padding: 5px;
    border-bottom: 1px solid #30363d;
  }

  /* 3. CONTENT AREA (REMAINING SPACE) */
  main {
    flex: 1;
    position: relative;
    padding: 8px;
  }

  .tab-content {
    position: absolute;
    top: 5px; left: 8px; right: 8px; bottom: 5px;
    background: var(--card);
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: none;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .tab-content.active { display: block; }

  /* 4. PREMIUM NAVIGATION */
  nav {
    height: 70px;
    background: #000;
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 1px solid #30363d;
  }

  nav button {
    flex: 1;
    background: none;
    border: none;
    color: #666;
    font-weight: bold;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.3s;
  }

  nav button.active {
    color: var(--neon);
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent);
    border-top: 3px solid var(--neon);
  }
</style>
</head>
<body>

<div class="main-app">
  <header>
    <h1>📈 GROWTH TRADE</h1>
  </header>

  <div class="ticker-section">
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-tickers.js">
    {
      "symbols": [
        {"proName": "FOREXCOM:SPX500", "title": "S&P 500"},
        {"proName": "BITSTAMP:BTCUSD", "title": "BTC/USD"},
        {"proName": "BITSTAMP:ETHUSD", "title": "ETH/USD"},
        {"proName": "NSE:NIFTY", "title": "NIFTY 50"},
        {"proName": "NSE:BANKNIFTY", "title": "BANK NIFTY"}
      ],
      "colorTheme": "dark",
      "isTransparent": true,
      "locale": "en"
    }
    </script>
  </div>

  <main>
    <div id="crypto" class="tab-content active">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
      {
        "width": "100%", "height": "100%", "defaultColumn": "overview",
        "screener_type": "crypto_mkt", "displayCurrency": "USD",
        "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>

    <div id="stocks" class="tab-content">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
      {
        "width": "100%", "height": "100%", "defaultColumn": "overview",
        "screener_type": "stock", "market": "india",
        "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>

    <div id="charts" class="tab-content">
      <div id="tradingview_widget" style="width: 100%; height: 100%;"></div>
    </div>
  </main>

  <nav>
    <button class="active" onclick="showTab('crypto', this)">Crypto</button>
    <button onclick="showTab('stocks', this)">Stocks</button>
    <button onclick="showTab('charts', this)">Charts</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartLoaded = false;

function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');

  if (id === 'charts' && !chartLoaded) {
    new TradingView.widget({
      "autosize": true,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "timezone": "Asia/Kolkata",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "toolbar_bg": "#f1f3f6",
      "enable_publishing": false,
      "allow_symbol_change": true,
      "container_id": "tradingview_widget",
      "studies": ["RSI@tv-basicstudies"]
    });
    chartLoaded = true;
  } else if (id === 'charts') {
    setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 100);
  }
}
</script>

</body>
</html>

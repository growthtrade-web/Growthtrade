<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Growth Trade Terminal v10</title>
<style>
  :root { --neon: #00ff88; --nav-h: 70px; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
  .app-shell { display: flex; flex-direction: column; height: 100dvh; }
  header { height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid var(--neon); background: #000; }
  header h1 { font-size: 18px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
  main { flex: 1; position: relative; overflow: hidden; background: #000; }
  nav { height: var(--nav-h); background: #000; display: flex; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom, 15px); }
  nav button { flex: 1; background: none; border: none; color: #555; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
  nav button.active { color: var(--neon); border-top: 3px solid var(--neon); background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent); }
  .map-tabs { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.9); padding: 6px; border-radius: 30px; border: 1px solid #444; z-index: 2000; }
  .map-tabs button { background: #222; border: none; color: #aaa; padding: 6px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; }
  .map-tabs button.active-sub { background: var(--neon); color: #000; font-weight: bold; }
</style>
</head>
<body>

<div class="app-shell">
  <header><h1>📈 GROWTH TRADE</h1></header>
  <main id="view-port"><div id="content-area" style="width:100%; height:100%;"></div></main>
  <nav id="bottom-nav">
    <button class="active" onclick="loadWidget('crypto', this)">Crypto</button>
    <button onclick="loadWidget('india_stocks', this)">India Stocks</button>
    <button onclick="loadWidget('charts', this)">Charts</button>
    <button onclick="loadWidget('events', this)">Events</button>
    <button onclick="loadWidget('heatmap', this)">Heatmap</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const container = document.getElementById('content-area');

function loadWidget(type, btn) {
  document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  container.innerHTML = "";

  if (type === 'crypto') {
    renderScript("https://s3.tradingview.com/external-embedding/embed-widget-screener.js", {"width": "100%", "height": "100%", "screener_type": "crypto_mkt", "colorTheme": "dark", "locale": "en"});
  } 
  else if (type === 'india_stocks') {
    // Wapas Indian Stocks list add kar di
    renderScript("https://s3.tradingview.com/external-embedding/embed-widget-screener.js", {"width": "100%", "height": "100%", "screener_type": "stock", "market": "india", "colorTheme": "dark", "locale": "en"});
  }
  else if (type === 'charts') {
    const div = document.createElement('div'); div.id = "tv_chart"; div.style.height = "100%"; container.appendChild(div);
    new TradingView.widget({"autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "tv_chart", "allow_symbol_change": true});
  }
  else if (type === 'events') {
    renderScript("https://s3.tradingview.com/external-embedding/embed-widget-events.js", {"width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en"});
  }
  else if (type === 'heatmap') {
    const navDiv = document.createElement('div'); navDiv.className = "map-tabs";
    navDiv.innerHTML = `<button id="m1" class="active-sub" onclick="runHeatmap('crypto', 'm1')">Crypto</button>
                        <button id="m3" onclick="runHeatmap('us', 'm3')">US Stocks</button>`;
    container.appendChild(navDiv);
    const mapDisplay = document.createElement('div'); mapDisplay.id = "map-render"; mapDisplay.style.height = "100%"; container.appendChild(mapDisplay);
    runHeatmap('crypto', 'm1');
  }
}

function runHeatmap(market, btnId) {
  const display = document.getElementById('map-render');
  display.innerHTML = ""; 
  document.querySelectorAll('.map-tabs button').forEach(b => b.classList.remove('active-sub'));
  document.getElementById(btnId).classList.add('active-sub');

  let scriptUrl, config;
  if (market === 'crypto') {
    scriptUrl = "https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js";
    config = { "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" };
  } else {
    scriptUrl = "https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js";
    config = { "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en", "dataSource": "SPX500", "grouping": "sector" };
  }
  const script = document.createElement('script');
  script.src = scriptUrl + "?v=" + new Date().getTime();
  script.async = true; script.innerHTML = JSON.stringify(config);
  display.appendChild(script);
}

function renderScript(src, config) {
  const script = document.createElement('script'); script.src = src; script.async = true;
  script.innerHTML = JSON.stringify(config); container.appendChild(script);
}

window.onload = () => loadWidget('crypto', document.querySelector('#bottom-nav button'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Trade | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .nav-link { color: #9ca3af; cursor: pointer; padding-bottom: 4px; transition: 0.3s; border-bottom: 2px solid transparent; }
        .nav-link:hover, .active { color: #22c55e; border-bottom: 2px solid #22c55e; }
        .content-section { display: none; }
        .active-section { display: block; }
        iframe { width: 100%; height: 600px; border: none; border-radius: 8px; background: #1a1a1a; }
    </style>
</head>
<body class="p-4">

    <div class="flex items-center justify-center gap-2 mb-4 border-b border-green-500 pb-2">
        <img src="https://cdn-icons-png.flaticon.com/512/4222/4222025.png" width="30" alt="logo">
        <h1 class="text-2xl font-bold text-green-500 uppercase tracking-widest">GROWTH TRADE</h1>
    </div>

    <nav class="flex justify-between md:justify-center md:gap-10 text-xs md:text-sm font-bold uppercase mb-6 overflow-x-auto whitespace-nowrap py-2">
        <span onclick="showPage('crypto')" class="nav-link active" id="btn-crypto">CRYPTO</span>
        <span onclick="showPage('stocks')" class="nav-link" id="btn-stocks">STOCKS</span>
        <span onclick="showPage('charts')" class="nav-link" id="btn-charts">CHARTS</span>
        <span onclick="showPage('events')" class="nav-link" id="btn-events">EVENTS</span>
        <span onclick="showPage('heatmap')" class="nav-link" id="btn-heatmap">HEATMAP</span>
    </nav>

    <div id="crypto" class="content-section active-section">
        <iframe src="https://www.tradingview.com/embed-widget/crypto-mkt-screener/?locale=en&colorTheme=dark"></iframe>
    </div>

    <div id="stocks" class="content-section">
        <iframe src="https://www.tradingview.com/embed-widget/hotlists/?locale=en&colorTheme=dark&exchange=NSE"></iframe>
    </div>

    <div id="charts" class="content-section">
        <iframe src="https://www.tradingview.com/widgetembed/?frameElementId=tradingview_76796&symbol=BINANCE:BTCUSDT&interval=D&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=[]&theme=dark&style=1&timezone=Etc%2FUTC"></iframe>
    </div>

    <div id="events" class="content-section">
        <iframe src="https://www.tradingview.com/embed-widget/events/?locale=en&colorTheme=dark&width=100%&height=600"></iframe>
    </div>

    <div id="heatmap" class="content-section">
        <div class="flex gap-2 mb-4 overflow-x-auto">
            <button onclick="changeHeatmap('crypto-map')" class="bg-gray-800 px-4 py-1 rounded text-xs hover:bg-green-600">Crypto</button>
            <button onclick="changeHeatmap('india-map')" class="bg-gray-800 px-4 py-1 rounded text-xs hover:bg-green-600">Indian Stocks</button>
            <button onclick="changeHeatmap('us-map')" class="bg-gray-800 px-4 py-1 rounded text-xs hover:bg-green-600">US Stocks</button>
        </div>
        
        <div id="crypto-map" class="h-map">
            <iframe src="https://www.tradingview.com/embed-widget/crypto-coins-heatmap/?colorTheme=dark&width=100%&height=600"></iframe>
        </div>
        <div id="india-map" class="h-map hidden">
            <iframe src="https://www.tradingview.com/embed-widget/stock-heatmap/?exchange=NSE&colorTheme=dark&width=100%&height=600"></iframe>
        </div>
        <div id="us-map" class="h-map hidden">
            <iframe src="https://www.tradingview.com/embed-widget/stock-heatmap/?dataSource=SPX500&colorTheme=dark&width=100%&height=600"></iframe>
        </div>
    </div>

    <script>
        function showPage(id) {
            // Hide all sections
            const sections = document.querySelectorAll('.content-section');
            sections.forEach(s => s.classList.remove('active-section'));
            
            // Remove active class from nav
            const links = document.querySelectorAll('.nav-link');
            links.forEach(l => l.classList.remove('active'));

            // Show selected
            document.getElementById(id).classList.add('active-section');
            document.getElementById('btn-' + id).classList.add('active');
        }

        function changeHeatmap(mapId) {
            const maps = document.querySelectorAll('.h-map');
            maps.forEach(m => m.classList.add('hidden'));
            document.getElementById(mapId).classList.remove('hidden');
        }
    </script>
</body>
</html>

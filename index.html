<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Trade Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
  :root {
    --bg-main: #0a0e17;
    --neon: #00ff88;
    --glow: rgba(0, 255, 136, 0.4);
    --header-h: 60px;
    --nav-h: 75px;
  }

  /* 1. FIX: Background kabhi nahi katega */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    height: 100%;
    width: 100%;
    background: radial-gradient(circle at top, #1a1a2e 0%, #0a0e17 100%) no-repeat fixed;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden; /* Main body scroll nahi hogi */
  }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh; /* Dynamic Viewport Height for mobile */
    width: 100%;
  }

  /* 2. FIX: Header fix rahega */
  header {
    height: var(--header-h);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid var(--neon);
    box-shadow: 0 4px 20px var(--glow);
    z-index: 100;
  }

  header h1 {
    font-size: 20px;
    font-weight: 800;
    color: var(--neon);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--glow);
  }

  /* 3. FIX: Sirf content scroll hoga, widgets overlap nahi karenge */
  main {
    flex-grow: 1;
    position: relative;
    overflow: hidden; /* Bahar ka overflow band */
    padding: 10px;
  }

  .content-container {
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
  }

  .tab-panel {
    position: absolute;
    inset: 0;
    display: none;
    -webkit-overflow-scrolling: touch; /* Smooth mobile scroll */
  }

  .tab-panel.active { display: block; }

  /* 4. FIX: Navigation buttons upar shift kar diye hain */
  nav {
    height: var(--nav-h);
    flex-shrink: 0;
    background: #000;
    display: flex;
    border-top: 1px solid #333;
    padding-bottom: env(safe-area-inset-bottom, 10px);
    z-index: 100;
  }

  nav button {
    flex: 1;
    background: none;
    border: none;
    color: #666;
    font-weight: bold;
    font-size: 13px;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  nav button.active {
    color: var(--neon);
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent);
    border-top: 4px solid var(--neon);
    text-shadow: 0 0 8px var(--glow);
  }
</style>
</head>
<body>

<div class="app-shell">
  <header>
    <h1>📈 GROWTH TRADE</h1>
  </header>

  <main>
    <div class="content-container">
      <div id="crypto" class="tab-panel active">
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
        {
          "width": "100%", "height": "100%", "defaultColumn": "overview",
          "screener_type": "crypto_mkt", "displayCurrency": "USD",
          "colorTheme": "dark", "locale": "en"
        }
        </script>
      </div>

      <div id="stocks" class="tab-panel">
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
        {
          "width": "100%", "height": "100%", "defaultColumn": "overview",
          "screener_type": "stock", "market": "india",
          "colorTheme": "dark", "locale": "en"
        }
        </script>
      </div>

      <div id="charts" class="tab-panel">
        <div id="tv_chart_container" style="width: 100%; height: 100%;"></div>
      </div>
    </div>
  </main>

  <nav>
    <button class="active" onclick="openTab('crypto', this)">Crypto</button>
    <button onclick="openTab('stocks', this)">Stocks</button>
    <button onclick="openTab('charts', this)">Charts</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartReady = false;
function openTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  
  document.getElementById(name).classList.add('active');
  btn.classList.add('active');

  if (name === 'charts' && !chartReady) {
    new TradingView.widget({
      "autosize": true,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "timezone": "Asia/Kolkata",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "container_id": "tv_chart_container",
      "allow_symbol_change": true,
      "studies": ["RSI@tv-basicstudies"]
    });
    chartReady = true;
  }
}
</script>

</body>
</html>

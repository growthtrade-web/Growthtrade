<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Growth Trade pro v3</title>
<style>
  :root { --neon: #00ff88; --nav-h: 75px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body { 
    height: 100%; width: 100%; 
    background: #000; color: white; 
    overflow: hidden; font-family: sans-serif; 
  }
  
  .app-shell { display: flex; flex-direction: column; height: 100dvh; width: 100%; }
  
  header { 
    height: 50px; flex-shrink: 0; 
    display: flex; align-items: center; justify-content: center; 
    border-bottom: 2px solid var(--neon); 
    background: #000; z-index: 100; 
  }
  header h1 { font-size: 18px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

  /* Widget Container */
  main { flex: 1; position: relative; background: #000; overflow: hidden; }
  #widget-container { width: 100%; height: 100%; border: none; }

  /* Navigation Fix for Mobile */
  nav { 
    height: var(--nav-h); 
    flex-shrink: 0; 
    background: #000; 
    display: flex; 
    border-top: 1px solid #333; 
    padding-bottom: env(safe-area-inset-bottom, 15px); 
    z-index: 1000;
  }
  nav button { 
    flex: 1; background: none; border: none; 
    color: #555; font-size: 10px; font-weight: bold; 
    text-transform: uppercase; display: flex; 
    align-items: center; justify-content: center;
    cursor: pointer;
  }
  nav button.active { 
    color: var(--neon); 
    border-top: 3px solid var(--neon); 
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent); 
  }
</style>
</head>
<body>

<div class="app-shell">
  <header><h1>📈 GROWTH TRADE</h1></header>
  
  <main id="view-port">
    <div id="content-area" style="width:100%; height:100%;"></div>
  </main>

  <nav id="bottom-nav">
    <button class="active" onclick="loadWidget('crypto', this)">Crypto</button>
    <button onclick="loadWidget('stocks', this)">Stocks</button>
    <button onclick="loadWidget('charts', this)">Charts</button>
    <button onclick="loadWidget('events', this)">Events</button>
    <button onclick="loadWidget('heatmap', this)">Heatmap</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const container = document.getElementById('content-area');

function loadWidget(type, btn) {
  // 1. Navigation Active State
  document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // 2. Clear Content (Isse Overlapping Bug 100% khatam)
  container.innerHTML = "";

  // 3. Load New Widget
  if (type === 'crypto') {
    const script = document.createElement('script');
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-screener.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
      "width": "100%", "height": "100%", "defaultColumn": "overview",
      "screener_type": "crypto_mkt", "displayCurrency": "USD",
      "colorTheme": "dark", "locale": "en"
    });
    container.appendChild(script);
  } 
  
  else if (type === 'stocks') {
    const script = document.createElement('script');
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-screener.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
      "width": "100%", "height": "100%", "defaultColumn": "overview",
      "screener_type": "stock", "market": "india",
      "colorTheme": "dark", "locale": "en"
    });
    container.appendChild(script);
  }

  else if (type === 'charts') {
    const div = document.createElement('div');
    div.id = "tv_chart_main";
    div.style.height = "100%";
    container.appendChild(div);
    new TradingView.widget({
      "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15",
      "theme": "dark", "container_id": "tv_chart_main", "allow_symbol_change": true
    });
  }

  else if (type === 'events') {
    const script = document.createElement('script');
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-events.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
      "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en"
    });
    container.appendChild(script);
  }

  else if (type === 'heatmap') {
    const script = document.createElement('script');
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
      "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en"
    });
    container.appendChild(script);
  }
}

// Initial Load
window.onload = () => {
  loadWidget('crypto', document.querySelector('#bottom-nav button'));
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Trade Premium App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
  /* 1. FinTech Colorful Palette */
  :root {
    --bg-deep: #0c1021;     /* Naya Deep Navy background */
    --bg-card: #0e1426;     /* Card background */
    --bg-ticker: #131722;   /* Ticker background */
    --accent: #00ff88;      /* Bright Neon Green (Glow) */
    --text-main: #fff;
    --text-dim: #9ea3ae;
    --card-border: rgba(0, 255, 136, 0.15); /* Subtle green border */
    --card-glow: 0 4px 20px rgba(0, 255, 136, 0.1); /* Neon Green Aura Glow */
    --header-height: 54px;
    --ticker-height: 70px;
    --nav-height: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background-color: var(--bg-deep);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-main);
    overflow: hidden;
  }

  /* Main Responsive Container */
  .app-container {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
  }

  /* 2. Colorful Header (Cleaned & Stylized) */
  header {
    height: var(--header-height);
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--bg-card);
    border-bottom: 2px solid var(--card-border);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    z-index: 100;
  }

  header span {
    color: var(--accent); /* Light Neon Green Text */
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); /* Soft Glow */
  }

  /* 3. Modern Card Ticker Tape (Rounded & Glowing) */
  .ticker-section {
    padding: 10px 10px 0 10px; /* Space for cards */
    flex-shrink: 0;
  }

  .ticker-container {
    height: var(--ticker-height);
    background-color: var(--bg-ticker);
    border-radius: 12px; /* Rounded corners */
    border: 1px solid var(--card-border);
    box-shadow: var(--card-glow);
    overflow: hidden;
    display: block;
  }

  /* 4. Main Content Area (Glowing Card) */
  main {
    flex-grow: 1;
    position: relative;
    overflow: hidden;
    padding: 10px; /* Space for cards */
  }

  .content-card {
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    background-color: var(--bg-card);
    border-radius: 16px;
    border: 1px solid var(--card-border);
    box-shadow: var(--card-glow);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease-in-out;
    overflow: hidden;
  }

  .content-card.active {
    opacity: 1;
    pointer-events: auto;
  }

  .widget-full { width: 100%; height: 100%; }

  /* 5. Custom Colorful Scrollbars (TradingView Widgets will inherit) */
  .content-card *::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  .content-card *::-webkit-scrollbar-track {
    background: var(--bg-pure);
  }
  .content-card *::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 10px;
  }
  .content-card *::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 255, 136, 0.8);
  }

  /* 6. FinTech Colorful Navigation (Premium Glow) */
  nav {
    height: calc(var(--nav-height) + env(safe-area-inset-bottom));
    background-color: var(--bg-card);
    border-top: 1px solid var(--card-border);
    border-radius: 16px 16px 0 0; /* Modern curved top */
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding-bottom: env(safe-area-inset-bottom);
    flex-shrink: 0;
    box-shadow: 0 -4px 15px rgba(0,0,0,0.4);
    z-index: 100;
  }

  nav button {
    flex: 1;
    height: 100%;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    transition: all 0.3s ease;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    border-top: 3px solid transparent;
  }

  nav button.active {
    color: var(--accent);
    background-color: rgba(0, 255, 136, 0.08); /* Green Transparent Glow */
    border-top: 3px solid var(--accent);
    text-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
  }
</style>
</head>

<body>

<div class="app-container">

  <header>
    <span>📈 GROWTH TRADE</span>
  </header>

  <div class="ticker-section">
    <div class="ticker-container">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js">
      {
        "symbols": [
          {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
          {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
          {"proName": "NSE:NIFTY", "title": "NIFTY"},
          {"proName": "NSE:BANKNIFTY", "title": "BANKNIFTY"},
          {"proName": "BINANCE:SOLUSDT", "title": "SOL"}
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": true,
        "displayMode": "adaptive",
        "locale": "en"
      }
      </script>
    </div>
  </div>

  <main>
    <div id="crypto" class="content-card active">
      <div class="widget-full">
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
        {
          "width": "100%", "height": "100%", "defaultColumn": "overview",
          "screener_type": "crypto_mkt", "displayCurrency": "USD",
          "colorTheme": "dark", "locale": "en"
        }
        </script>
      </div>
    </div>

    <div id="stocks" class="content-card">
      <div class="widget-full">
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
        {
          "width": "100%", "height": "100%", "defaultColumn": "overview",
          "screener_type": "stock", "market": "india",
          "colorTheme": "dark", "locale": "en"
        }
        </script>
      </div>
    </div>

    <div id="charts" class="content-card">
      <div id="tv_chart" class="widget-full"></div>
    </div>
  </main>

  <nav>
    <button class="active" onclick="openTab('crypto', this)">Crypto</button>
    <button onclick="openTab('stocks', this)">Stocks</button>
    <button onclick="openTab('charts', this)">Charts</button>
  </nav>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartLoaded = false;

function openTab(id, btn) {
  // 1. Fade out all sections
  document.querySelectorAll(".content-card").forEach(s => s.classList.remove("active"));
  // 2. Reset nav buttons
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));

  // 3. Activate current tab
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");

  // 4. Chart load logic ( പഠനം RSI is already here!)
  if (id === "charts") {
    if (!chartLoaded) {
      new TradingView.widget({
        "container_id": "tv_chart",
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "15",
        "timezone": "Asia/Kolkata",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "allow_symbol_change": true,
        "details": true,
        "studies": [
          "RSI@tv-basicstudies"
        ]
      });
      chartLoaded = true;
    } else {
      // Force chart container to recalculate layout
      setTimeout(() => {
        window.dispatchEvent(new Event('resize'));
      }, 50); // Small delay to ensure CSS opacity has completed
    }
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Trade Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
  :root {
    --bg-dark: #0b0f1a;
    --nav-bg: #0e1426;
    --accent: #00ff88;
    --text-dim: #8f929d;
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg-dark);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  header {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--nav-bg);
    color: var(--accent);
    font-size: 18px;
    font-weight: bold;
    border-bottom: 1px solid #1e222d;
  }

  /* TICKER FIX: 72px space di hai taaki bada data aur icons fit ho jayein */
  .ticker-container {
    height: 72px; 
    background: #131722;
    overflow: hidden;
    border-bottom: 1px solid #2a2e39;
    display: block;
  }

  section {
    display: none;
    /* Header(50) + Ticker(72) + Nav(60) = 182px gap */
    height: calc(100vh - 182px);
    width: 100%;
  }

  section.active { display: block; }

  .widget-full { width: 100%; height: 100%; }

  /* Navigation Bar Styling */
  nav {
    height: 60px;
    background: var(--nav-bg);
    display: flex;
    justify-content: space-around;
    align-items: center;
    position: fixed;
    bottom: 0;
    width: 100%;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 1px solid #2a2e39;
    z-index: 999;
  }

  nav button {
    flex: 1;
    height: 100%;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    transition: 0.2s;
  }

  nav button.active {
    color: var(--accent);
    background: rgba(0, 255, 136, 0.08);
    border-top: 3px solid var(--accent);
  }
</style>
</head>

<body>

<header>📊 Growth Trade Terminal</header>

<div class="ticker-container">
  <script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js">
  {
    "symbols": [
      {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
      {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
      {"proName": "NSE:NIFTY", "title": "NIFTY"},
      {"proName": "NSE:BANKNIFTY", "title": "BANKNIFTY"},
      {"proName": "BINANCE:SOLUSDT", "title": "SOL"}
    ],
    "showSymbolLogo": true,
    "colorTheme": "dark",
    "isTransparent": true,
    "displayMode": "adaptive",
    "locale": "en"
  }
  </script>
</div>

<section id="crypto" class="active">
  <div class="widget-full">
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
    {
      "width": "100%", "height": "100%", "defaultColumn": "overview",
      "screener_type": "crypto_mkt", "displayCurrency": "USD",
      "colorTheme": "dark", "locale": "en"
    }
    </script>
  </div>
</section>

<section id="stocks">
  <div class="widget-full">
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
    {
      "width": "100%", "height": "100%", "defaultColumn": "overview",
      "screener_type": "stock", "market": "india",
      "colorTheme": "dark", "locale": "en"
    }
    </script>
  </div>
</section>

<section id="charts">
  <div id="tv_chart" class="widget-full"></div>
</section>

<nav>
  <button class="active" onclick="openTab('crypto', this)">Crypto</button>
  <button onclick="openTab('stocks', this)">Stocks</button>
  <button onclick="openTab('charts', this)">Charts</button>
</nav>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartLoaded = false;

function openTab(id, btn) {
  // Sabhi sections chhupao
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  // Buttons ko reset karo
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));

  // Select kiya gaya tab dikhao
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");

  // Chart loading logic
  if (id === "charts") {
    if (!chartLoaded) {
      new TradingView.widget({
        "container_id": "tv_chart",
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "15",
        "timezone": "Asia/Kolkata",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "allow_symbol_change": true,
        "details": true
      });
      chartLoaded = true;
    } else {
      // Resize fix
      window.dispatchEvent(new Event('resize'));
    }
  }
}
</script>

</body>
</html>

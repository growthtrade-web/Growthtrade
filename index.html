<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Trade Ultra Plus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
  :root {
    /* ULTRA COLORFUL GRADIENT */
    --bg-main: linear-gradient(160deg, #0f0c29 0%, #302b63 35%, #24243e 70%, #000000 100%);
    --accent-neon: #00ff88;
    --glass: rgba(255, 255, 255, 0.05);
    --card-border: rgba(0, 255, 136, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, html {
    height: 100%;
    background: var(--bg-main);
    background-attachment: fixed;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .wrapper { display: flex; flex-direction: column; height: 100%; }

  /* Premium Colorful Header */
  header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(15px);
    border-bottom: 2px solid var(--accent-neon);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
  }

  header h1 {
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent-neon);
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
  }

  /* Ticker Tape Styling */
  .ticker-area {
    height: 75px;
    padding: 10px;
    flex-shrink: 0;
  }

  .ticker-container {
    height: 100%;
    background: rgba(13, 17, 34, 0.8);
    border-radius: 12px;
    border: 1px solid var(--card-border);
    overflow: hidden;
  }

  /* Main Dynamic Section */
  main {
    flex-grow: 1;
    position: relative;
    padding: 0 10px 10px 10px;
  }

  .page {
    position: absolute;
    top: 0; left: 10px; right: 10px; bottom: 0;
    background: rgba(10, 14, 26, 0.9);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
    overflow: hidden;
  }

  .page.active { opacity: 1; pointer-events: auto; }

  /* Colorful Bottom Nav */
  nav {
    height: 70px;
    background: #000;
    display: flex;
    border-top: 1px solid #333;
    padding-bottom: env(safe-area-inset-bottom);
  }

  nav button {
    flex: 1;
    background: none;
    border: none;
    color: #777;
    font-weight: bold;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.3s;
  }

  nav button.active {
    color: var(--accent-neon);
    background: linear-gradient(to top, rgba(0, 255, 136, 0.15), transparent);
    border-top: 3px solid var(--accent-neon);
  }
</style>
</head>

<body>

<div class="wrapper">
  
  <header>
    <h1>📈 GROWTH TRADE</h1>
  </header>

  <div class="ticker-area">
    <div class="ticker-container">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js">
      {
        "symbols": [
          {"proName": "INDEX:NIFTY", "title": "NIFTY 50"},
          {"proName": "INDEX:BANKNIFTY", "title": "BANK NIFTY"},
          {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
          {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
          {"proName": "BINANCE:SOLUSDT", "title": "SOL"}
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": true,
        "displayMode": "adaptive",
        "locale": "en"
      }
      </script>
    </div>
  </div>

  <main>
    <div id="crypto" class="page active">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
      {
        "width": "100%", "height": "100%", "defaultColumn": "overview",
        "screener_type": "crypto_mkt", "displayCurrency": "USD",
        "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>

    <div id="stocks" class="page">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
      {
        "width": "100%", "height": "100%", "defaultColumn": "overview",
        "screener_type": "stock", "market": "india",
        "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>

    <div id="charts" class="page">
      <div id="tv_chart" style="width:100%; height:100%;"></div>
    </div>
  </main>

  <nav>
    <button class="active" onclick="openTab('crypto', this)">Crypto</button>
    <button onclick="openTab('stocks', this)">Stocks</button>
    <button onclick="openTab('charts', this)">Charts</button>
  </nav>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartLoaded = false;
function openTab(id, btn) {
  document.querySelectorAll(".page").forEach(s => s.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");

  if (id === "charts" && !chartLoaded) {
    new TradingView.widget({
      "container_id": "tv_chart",
      "autosize": true,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "timezone": "Asia/Kolkata",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "enable_publishing": false,
      "allow_symbol_change": true,
      "details": true,
      "studies": ["RSI@tv-basicstudies"]
    });
    chartLoaded = true;
  } else if (id === "charts") {
    setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 100);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Trade Ultra</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
  :root {
    /* BESTEST COLOR PALETTE */
    --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    --bg-card: rgba(14, 20, 38, 0.8);
    --accent-neon: #00ff88; 
    --accent-glow: rgba(0, 255, 136, 0.4);
    --text-white: #ffffff;
    --nav-bg: #0a0e1a;
    --header-h: 60px;
    --ticker-h: 75px;
    --nav-h: 65px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, html {
    height: 100%;
    /* Naya Colorful Gradient Background */
    background: var(--bg-gradient);
    background-attachment: fixed;
    font-family: 'Poppins', sans-serif;
    color: var(--text-white);
    overflow: hidden;
  }

  .app-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* Stylish Colorful Header */
  header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  header h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent-neon);
    letter-spacing: 2px;
    text-shadow: 0 0 15px var(--accent-glow);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Ticker Tape Styling */
  .ticker-wrap {
    height: var(--ticker-h);
    padding: 8px;
    flex-shrink: 0;
  }

  .ticker-box {
    height: 100%;
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid rgba(0, 255, 136, 0.2);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  /* Main Content Area */
  main {
    flex-grow: 1;
    position: relative;
    padding: 0 10px;
  }

  .glass-card {
    position: absolute;
    top: 0; left: 10px; right: 10px; bottom: 5px;
    background: var(--bg-card);
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: 0.4s ease;
    overflow: hidden;
  }

  .glass-card.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Colorful Bottom Nav */
  nav {
    height: calc(var(--nav-h) + env(safe-area-inset-bottom));
    background: var(--nav-bg);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 2px solid var(--accent-neon);
    box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
  }

  nav button {
    flex: 1;
    background: none;
    border: none;
    color: #888;
    font-weight: bold;
    font-size: 13px;
    text-transform: uppercase;
    transition: 0.3s;
    cursor: pointer;
  }

  nav button.active {
    color: var(--accent-neon);
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent);
    text-shadow: 0 0 10px var(--accent-glow);
  }
</style>
</head>

<body>

<div class="app-wrapper">
  
  <header>
    <h1>📈 GROWTH TRADE</h1>
  </header>

  <div class="ticker-wrap">
    <div class="ticker-box">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js">
      {
        "symbols": [
          {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
          {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
          {"proName": "NSE:NIFTY", "title": "NIFTY 50"},
          {"proName": "NSE:BANKNIFTY", "title": "BANK NIFTY"},
          {"proName": "BINANCE:SOLUSDT", "title": "SOL"}
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": true,
        "displayMode": "adaptive",
        "locale": "en"
      }
      </script>
    </div>
  </div>

  <main>
    <div id="crypto" class="glass-card active">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
      {
        "width": "100%", "height": "100%", "defaultColumn": "overview",
        "screener_type": "crypto_mkt", "displayCurrency": "USD",
        "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>

    <div id="stocks" class="glass-card">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
      {
        "width": "100%", "height": "100%", "defaultColumn": "overview",
        "screener_type": "stock", "market": "india",
        "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>

    <div id="charts" class="glass-card">
      <div id="tv_chart" style="width:100%; height:100%;"></div>
    </div>
  </main>

  <nav>
    <button class="active" onclick="openTab('crypto', this)">Crypto</button>
    <button onclick="openTab('stocks', this)">Stocks</button>
    <button onclick="openTab('charts', this)">Charts</button>
  </nav>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartLoaded = false;
function openTab(id, btn) {
  document.querySelectorAll(".glass-card").forEach(s => s.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");

  if (id === "charts" && !chartLoaded) {
    new TradingView.widget({
      "container_id": "tv_chart",
      "autosize": true,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "timezone": "Asia/Kolkata",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "enable_publishing": false,
      "allow_symbol_change": true,
      "details": true,
      "studies": ["RSI@tv-basicstudies"]
    });
    chartLoaded = true;
  } else if (id === "charts") {
    setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 100);
  }
}
</script>

</body>
</html>

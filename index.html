<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Trade Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
  :root {
    --bg-gradient: linear-gradient(160deg, #0f0c29 0%, #302b63 100%);
    --neon: #00ff88;
    --card-bg: rgba(10, 14, 26, 0.95);
    --header-h: 60px;
    --nav-h: 75px; /* Thoda bada navigation height */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, html {
    height: 100%;
    background: var(--bg-gradient);
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* 1. Colorful Header (Glow Effect) */
  header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid var(--neon);
    z-index: 100;
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--neon);
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(0, 255, 136, 0.6);
  }

  /* 2. Main Content Area (Full Screen minus Header & Nav) */
  main {
    flex: 1;
    position: relative;
    padding: 10px;
    overflow: hidden;
  }

  .content-view {
    position: absolute;
    top: 5px; left: 10px; right: 10px; bottom: 5px;
    background: var(--card-bg);
    border-radius: 20px;
    border: 1px solid rgba(0, 255, 136, 0.2);
    display: none;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }

  .content-view.active { display: block; }

  /* 3. Improved Navigation (Shifted Upwards) */
  nav {
    height: var(--nav-h);
    background: #000;
    display: flex;
    /* Bottom padding ko adjust kiya taaki button kute nahi */
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid #333;
    z-index: 100;
  }

  nav button {
    flex: 1;
    background: none;
    border: none;
    color: #888;
    font-weight: bold;
    font-size: 13px;
    text-transform: uppercase;
    transition: 0.3s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  nav button.active {
    color: var(--neon);
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent);
    border-top: 4px solid var(--neon);
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
  }
</style>
</head>
<body>

<div class="app-container">
  
  <header>
    <h1>📈 GROWTH TRADE</h1>
  </header>

  <main>
    <div id="crypto" class="content-view active">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
      {
        "width": "100%", "height": "100%", "defaultColumn": "overview",
        "screener_type": "crypto_mkt", "displayCurrency": "USD",
        "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>

    <div id="stocks" class="content-view">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
      {
        "width": "100%", "height": "100%", "defaultColumn": "overview",
        "screener_type": "stock", "market": "india",
        "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>

    <div id="charts" class="content-view">
      <div id="tradingview_chart" style="width: 100%; height: 100%;"></div>
    </div>
  </main>

  <nav>
    <button class="active" onclick="switchTab('crypto', this)">Crypto</button>
    <button onclick="switchTab('stocks', this)">Stocks</button>
    <button onclick="switchTab('charts', this)">Charts</button>
  </nav>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartInit = false;

function switchTab(id, btn) {
  // Hide all
  document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  
  // Show target
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');

  // Chart logic
  if (id === 'charts' && !chartInit) {
    new TradingView.widget({
      "autosize": true,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "timezone": "Asia/Kolkata",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "enable_publishing": false,
      "allow_symbol_change": true,
      "container_id": "tradingview_chart",
      "studies": ["RSI@tv-basicstudies"]
    });
    chartInit = true;
  } else if (id === 'charts') {
    // Refresh layout for responsive charts
    setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 100);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Growth Trade Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
  :root {
    --bg: #05070a;
    --neon: #00ff88;
    --header-h: 60px;
    --nav-h: 70px;
  }

  /* FIX: Full Screen without Scroll Bugs */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    height: 100%;
    width: 100%;
    background: radial-gradient(circle at top, #1a1a2e 0%, #05070a 100%) no-repeat fixed;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden; /* Body scroll disable kiya bugs rokne ke liye */
  }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh; /* Dynamic Height for Mobile Browser Bars */
    width: 100%;
  }

  header {
    height: var(--header-h);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.8);
    border-bottom: 2px solid var(--neon);
    z-index: 100;
  }

  header h1 {
    font-size: 20px;
    color: var(--neon);
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    letter-spacing: 1px;
  }

  /* FIX: Is area mein sirf widget scroll hoga, poori app nahi */
  main {
    flex-grow: 1;
    position: relative;
    padding: 10px;
    overflow: hidden; 
  }

  .content-box {
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
  }

  .panel {
    position: absolute;
    inset: 0;
    display: none;
  }

  .panel.active { display: block; }

  /* FIX: Navigation is now clearly above the bottom bar */
  nav {
    height: var(--nav-h);
    flex-shrink: 0;
    background: #000;
    display: flex;
    border-top: 1px solid #333;
    /* Safe Area for iPhone/Android Gestures */
    padding-bottom: env(safe-area-inset-bottom, 12px); 
    z-index: 1000;
  }

  nav button {
    flex: 1;
    background: none;
    border: none;
    color: #777;
    font-weight: bold;
    font-size: 13px;
    text-transform: uppercase;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  nav button.active {
    color: var(--neon);
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent);
    border-top: 4px solid var(--neon);
  }
</style>
</head>
<body>

<div class="app-shell">
  <header>
    <h1>📈 GROWTH TRADE TERMINAL</h1>
  </header>

  <main>
    <div class="content-box">
      <div id="crypto" class="panel active">
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
        {
          "width": "100%", "height": "100%", "defaultColumn": "overview",
          "screener_type": "crypto_mkt", "displayCurrency": "USD",
          "colorTheme": "dark", "locale": "en"
        }
        </script>
      </div>

      <div id="stocks" class="panel">
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">
        {
          "width": "100%", "height": "100%", "defaultColumn": "overview",
          "screener_type": "stock", "market": "india",
          "colorTheme": "dark", "locale": "en"
        }
        </script>
      </div>

      <div id="charts" class="panel">
        <div id="chart_container" style="width: 100%; height: 100%;"></div>
      </div>
    </div>
  </main>

  <nav>
    <button class="active" onclick="showTab('crypto', this)">Crypto</button>
    <button onclick="showTab('stocks', this)">Stocks</button>
    <button onclick="showTab('charts', this)">Charts</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartInit = false;
function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');

  if (id === 'charts' && !chartInit) {
    new TradingView.widget({
      "autosize": true,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "timezone": "Asia/Kolkata",
      "theme": "dark",
      "container_id": "chart_container",
      "allow_symbol_change": true,
      "studies": ["RSI@tv-basicstudies"]
    });
    chartInit = true;
  }
}
</script>

</body>
</html>

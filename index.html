<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Growth Trade Terminal Pro</title>
<style>
  :root { --neon: #00ff88; --nav-h: 75px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body { 
    height: 100%; width: 100%; 
    background: #000; color: white; 
    overflow: hidden; font-family: sans-serif; 
  }
  
  .app-shell { display: flex; flex-direction: column; height: 100dvh; width: 100%; }
  
  header { 
    height: 50px; flex-shrink: 0; 
    display: flex; align-items: center; justify-content: center; 
    border-bottom: 2px solid var(--neon); 
    background: #000; z-index: 100; 
  }
  header h1 { font-size: 18px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

  /* FIX: Is area mein sirf EK widget dikhega */
  main { flex: 1; position: relative; background: #000; overflow: hidden; }

  /* Panels ko default display none rakha hai */
  .panel { 
    display: none; 
    width: 100%; 
    height: 100%; 
    position: absolute; 
    top: 0; left: 0;
  }
  .panel.active { display: block !important; }

  /* Navigation: Buttons ko Safe Area se upar rakha hai */
  nav { 
    height: var(--nav-h); 
    flex-shrink: 0; 
    background: #000; 
    display: flex; 
    border-top: 1px solid #333; 
    padding-bottom: env(safe-area-inset-bottom, 10px); 
    z-index: 1000;
  }
  nav button { 
    flex: 1; background: none; border: none; 
    color: #555; font-size: 10px; font-weight: bold; 
    text-transform: uppercase; display: flex; 
    align-items: center; justify-content: center;
    transition: 0.3s;
  }
  nav button.active { 
    color: var(--neon); 
    border-top: 3px solid var(--neon); 
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent); 
  }
</style>
</head>
<body>

<div class="app-shell">
  <header><h1>📈 GROWTH TRADE</h1></header>
  
  <main id="main-content">
    <div id="crypto" class="panel active">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">{"width":"100%","height":"100%","defaultColumn":"overview","screener_type":"crypto_mkt","displayCurrency":"USD","colorTheme":"dark","locale":"en"}</script>
    </div>
    
    <div id="stocks" class="panel">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">{"width":"100%","height":"100%","defaultColumn":"overview","screener_type":"stock","market":"india","colorTheme":"dark","locale":"en"}</script>
    </div>
    
    <div id="charts" class="panel"><div id="tv_chart" style="height:100%;"></div></div>
    
    <div id="events" class="panel">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-events.js">{"width":"100%","height":"100%","colorTheme":"dark","isTransparent":false,"locale":"en","importanceFilter":"-1,0,1"}</script>
    </div>
    
    <div id="heatmap" class="panel">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js">{"width":"100%","height":"100%","hasTopBar":true,"isDataSetEnabled":true,"colorTheme":"dark","symbolUrl":"","locale":"en"}</script>
    </div>
  </main>

  <nav id="bottom-nav">
    <button class="active" onclick="tab('crypto', this)">Crypto</button>
    <button onclick="tab('stocks', this)">Stocks</button>
    <button onclick="tab('charts', this)">Charts</button>
    <button onclick="tab('events', this)">Events</button>
    <button onclick="tab('heatmap', this)">Heatmap</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let chartInstance = false;

function tab(id, btn) {
  // 1. Pehle saare panels se 'active' class hatao aur unhe display none karo
  const panels = document.querySelectorAll('.panel');
  panels.forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none';
  });

  // 2. Nav buttons ka active state reset karo
  const navButtons = document.querySelectorAll('#bottom-nav button');
  navButtons.forEach(b => b.classList.remove('active'));

  // 3. Jo button click kiya usse active karo aur panel dikhao
  const targetPanel = document.getElementById(id);
  targetPanel.classList.add('active');
  targetPanel.style.display = 'block';
  btn.classList.add('active');

  // 4. Charts loading logic
  if(id === 'charts' && !chartInstance) {
    new TradingView.widget({
      "autosize": true,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "theme": "dark",
      "container_id": "tv_chart",
      "allow_symbol_change": true
    });
    chartInstance = true;
  }
}
</script>
</body>
</html>

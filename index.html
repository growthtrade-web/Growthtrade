<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Growth Trade Terminal</title>
<style>
  :root { --neon: #00ff88; --bg: #05070a; --nav-h: 80px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* Prevent scroll and shake bugs */
  html, body { 
    height: 100%; width: 100%; 
    background: #05070a; color: white; 
    overflow: hidden; font-family: 'Segoe UI', sans-serif; 
  }
  
  .app-shell { display: flex; flex-direction: column; height: 100dvh; width: 100%; }
  
  header { 
    height: 55px; flex-shrink: 0; 
    display: flex; align-items: center; justify-content: center; 
    border-bottom: 2px solid var(--neon); 
    background: rgba(0,0,0,0.95); z-index: 100; 
  }
  header h1 { font-size: 18px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

  main { flex-grow: 1; position: relative; overflow: hidden; background: #000; }

  /* Optimized Layering to stop Overlap Bugs */
  .panel { 
    position: absolute; 
    top: 0; left: 0; right: 0; bottom: 0;
    display: none; /* Puri tarah hide taaki lag na ho */
    background: #000;
  }
  .panel.active { display: block; z-index: 10; }

  /* Navigation Fix for Mobile Browser Bars */
  nav { 
    height: var(--nav-h); 
    flex-shrink: 0; 
    background: #000; 
    display: flex; 
    border-top: 1px solid #333; 
    padding-bottom: env(safe-area-inset-bottom, 15px); 
    z-index: 100;
  }
  nav button { 
    flex: 1; 
    background: none; 
    border: none; 
    color: #555; 
    font-size: 11px; 
    font-weight: bold; 
    text-transform: uppercase; 
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }
  nav button.active { 
    color: var(--neon); 
    border-top: 3px solid var(--neon); 
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent); 
  }
</style>
</head>
<body>

<div class="app-shell">
  <header><h1>📈 GROWTH TRADE</h1></header>
  
  <main>
    <div id="crypto" class="panel active">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">{"width":"100%","height":"100%","defaultColumn":"overview","screener_type":"crypto_mkt","displayCurrency":"USD","colorTheme":"dark","locale":"en"}</script>
    </div>
    
    <div id="stocks" class="panel">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js">{"width":"100%","height":"100%","defaultColumn":"overview","screener_type":"stock","market":"india","colorTheme":"dark","locale":"en"}</script>
    </div>
    
    <div id="charts" class="panel"><div id="tv_chart" style="height:100%;"></div></div>
    
    <div id="events" class="panel">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-events.js">{"width":"100%","height":"100%","colorTheme":"dark","isTransparent":false,"locale":"en","importanceFilter":"-1,0,1"}</script>
    </div>
    
    <div id="heatmap" class="panel">
      <script src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js">{"width":"100%","height":"100%","hasTopBar":true,"isDataSetEnabled":true,"colorTheme":"dark","symbolUrl":"","locale":"en"}</script>
    </div>
  </main>

  <nav>
    <button class="active" onclick="tab('crypto', this)">Crypto</button>
    <button onclick="tab('stocks', this)">Stocks</button>
    <button onclick="tab('charts', this)">Charts</button>
    <button onclick="tab('events', this)">Events</button>
    <button onclick="tab('heatmap', this)">Heatmap</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let c=false; 
function tab(id, b){
  // 1. Sab panels hide karo (No more overlapping bugs)
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('nav button').forEach(n => n.classList.remove('active'));
  
  // 2. Sirf select kiya hua panel dikhao
  document.getElementById(id).style.display = 'block'; 
  b.classList.add('active');

  // 3. Chart load logic (Only once to prevent lag)
  if(id==='charts' && !c){ 
    new TradingView.widget({
      "autosize":true,"symbol":"BINANCE:BTCUSDT","interval":"15","theme":"dark","container_id":"tv_chart","allow_symbol_change":true,"studies":["RSI@tv-basicstudies"]
    }); 
    c=true;
  }
}
</script>
</body>
</html>
